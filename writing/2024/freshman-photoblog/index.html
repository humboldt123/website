<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Freshman Photoblog | Writings</title>
        <meta charset="utf-8">
        <meta name="title" content="Freshman Photoblog" />
        <meta name="description" content="My freshman year in photo highlights!" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="/style/global.css">
        <link rel="stylesheet" href="/style/article.css">
        <style>
            .photo-row {
                display: flex;
                gap: 8px;
                margin-bottom: 8px;
            }

            .photo-col {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .photo-wide {
                margin-bottom: 8px;
            }

            .photo-row figure {
                margin: 0;
                cursor: default;
            }

            .photo-wide {
                margin: 0 0 8px;
                cursor: default;
            }

            .photo-row figure img,
            .photo-wide img {
                display: block;
                width: 100%;
                height: auto;
            }

            figcaption { display: none; }

            .doodle-cell {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1em 1em 0;
                flex-grow: 1;
            }

            .doodle-cell.doodle-end {
                align-items: flex-end;
            }

            .doodle-cell img {
                max-width: 85%;
                max-height: 200px;
                width: auto;
                height: auto;
            }

            /* Cat row */
            .cat-row {
                padding: 2.5em 0;
                overflow: visible;
            }

            .cat-row .cats {
                display: flex;
                justify-content: center;
                align-items: flex-end;
                overflow: visible;
            }

            .cat-row .cats img {
                width: 24%;
                margin: 0;
                transition: transform 0.3s;
            }

            .cat-row .cats img:nth-child(1) { transform: rotate(-15deg) translate(0, 0px); }
            .cat-row .cats img:nth-child(2) { transform: rotate(-5deg) translate(0, -20px); }
            .cat-row .cats img:nth-child(3) { transform: rotate(5deg) translate(0, -20px); }
            .cat-row .cats img:nth-child(4) { transform: rotate(15deg) translate(0, 0); }
            .cat-row .cats img:hover { transform: translateY(-20px) scale(1.1); z-index: 10; position: relative; }

            .cat-row p {
                text-align: center;
                font-size: 0.8em;
                color: var(--muted);
                font-style: italic;
                margin-top: 0.75em;
                margin-bottom: 0;
            }
        </style>
    </head>
    <body>
        <nav>
            <a href="/">home</a>
            <a href="/writing/">writing</a>
            <a href="/works/">works</a>
            <a href="/stuff/">stuff</a>
        </nav>
        <article>

            <p style="text-align: center; margin-top: 1em;"><i>&lt;/freshman_year&gt;</i></p>
